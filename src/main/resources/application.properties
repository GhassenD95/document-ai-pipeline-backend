spring.application.name=document-ai-pipeline-backend

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/docai
spring.datasource.username=${POSTGRES_USER:dev}
spring.datasource.password=${POSTGRES_PASSWORD:dev}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=docai
spring.rabbitmq.password=docai

# OCR
docai.ocr.tessdata=/usr/share/tesseract-ocr/5/tessdata/

# Server
server.port=8081
